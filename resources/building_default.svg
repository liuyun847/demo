<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <!-- 建筑主体 -->
  <rect x="12" y="22" width="40" height="34" rx="2" fill="#2ecc71" stroke="#27ae60" stroke-width="2"/>
  <!-- 屋顶 -->
  <polygon points="8,22 32,6 56,22" fill="#e74c3c" stroke="#c0392b" stroke-width="2" stroke-linejoin="round"/>
  <!-- 门 -->
  <rect x="26" y="40" width="12" height="16" rx="2" fill="#8e44ad" stroke="#6c3483" stroke-width="1.5"/>
  <circle cx="35" cy="48" r="1.5" fill="#f1c40f"/>
  <!-- 窗户左 -->
  <rect x="16" y="28" width="8" height="8" rx="1" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1.5"/>
  <line x1="20" y1="28" x2="20" y2="36" stroke="#bdc3c7" stroke-width="1"/>
  <line x1="16" y1="32" x2="24" y2="32" stroke="#bdc3c7" stroke-width="1"/>
  <!-- 窗户右 -->
  <rect x="40" y="28" width="8" height="8" rx="1" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1.5"/>
  <line x1="44" y1="28" x2="44" y2="36" stroke="#bdc3c7" stroke-width="1"/>
  <line x1="40" y1="32" x2="48" y2="32" stroke="#bdc3c7" stroke-width="1"/>
  <!-- 烟囱 -->
  <rect x="42" y="10" width="6" height="10" fill="#7f8c8d" stroke="#616a6b" stroke-width="1.5"/>
  <!-- 烟雾 -->
  <circle cx="45" cy="6" r="2" fill="#bdc3c7" opacity="0.8"/>
  <circle cx="48" cy="3" r="1.5" fill="#bdc3c7" opacity="0.6"/>
</svg>
